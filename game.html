<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bonefall Game | L’Éclaireur des Cités</title>
  <link rel="stylesheet" href="main.css?v=5">
  <link rel="stylesheet" href="game.css?v=1">
</head>
<body>

  <header>
    <h1>L’Éclaireur des Cités</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="index.html#collection">Collection</a>
      <a href="about.html">About</a>
      <a href="game.html">Game</a>
    </nav>
  </header>

  <section class="game-page">
    <div class="game-intro">
      <p class="season">Interactive Brand Experience</p>
      <h2>Bonefall</h2>
      <p>
        Click the falling bones before they hit the ground. Each bone saved adds to your score.
        Miss too many, and the city goes silent.
      </p>
    </div>

    <div class="scoreboard">
      <p>Score: <span id="score">0</span></p>
      <p>Missed: <span id="missed">0</span> / 5</p>
      <button id="startBtn">Start Game</button>
    </div>

    <div id="gameArea">
      <div class="tree">
        <div class="trunk"></div>
        <div class="branch branch1"></div>
        <div class="branch branch2"></div>
        <div class="branch branch3"></div>
        <div class="branch branch4"></div>
        <div class="branch branch5"></div>
      </div>

      <div class="ground"></div>
      <div id="gameMessage">Press Start</div>
    </div>
  </section>

  <script src="game.js?v=1"></script>
</body>
</html>
